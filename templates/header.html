<header class="main-header">
    <div class="header-container">
        <a href="/" class="header-logo">
            <svg class="header-logo-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect x="3" y="3" width="18" height="18" rx="2" stroke="currentColor" stroke-width="2"/>
                <path d="M9 9h6v6H9z" fill="currentColor"/>
                <path d="M3 15h6v6H3z" fill="currentColor" opacity="0.7"/>
                <path d="M15 3h6v6h-6z" fill="currentColor" opacity="0.7"/>
            </svg>
            <span class="header-title">Opencraft Launcher</span>
        </a>
        
        {% if user and user.authenticated %}
        <div class="user-menu">
            <div class="user-avatar-container">
                <img src="{{ user.picture }}" alt="{{ user.name }}" class="user-avatar">
                <div class="user-dropdown">
                    <div class="user-info">
                        <div class="user-name">{{ user.name }}</div>
                        <div class="user-email">{{ user.email }}</div>
                    </div>
                    <hr class="dropdown-divider">
                    <a href="/logout" class="dropdown-item logout-item">
                        <svg class="logout-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <polyline points="16,17 21,12 16,7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <line x1="21" y1="12" x2="9" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                        Logout
                    </a>
                </div>
            </div>
        </div>
        {% else %}
        <div class="header-buttons">
            <a href="/login" class="header-btn login-btn">Login</a>
            <a href="/signin" class="header-btn signin-btn">Sign In</a>
        </div>
        {% endif %}
    </div>
</header>
